  <text x="218" y="132" font-family="'Pretendard Variable', 'Segoe UI', sans-serif" font-weight="800" font-size="80" fill="white">Market</text>
  <text x="618" y="132" font-family="'Pretendard Variable', 'Segoe UI', sans-serif" font-weight="800" font-size="80" fill="rgba(255,255,255,0.8)">Share</text>
</svg>
