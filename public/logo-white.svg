<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" fill="none">
  <defs>
    <linearGradient id="iconBgW" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <rect width="180" height="180" x="10" y="10" rx="40" fill="url(#iconBgW)"/>
  <!-- Store roof -->
  <path d="M55 82 L100 52 L145 82" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <!-- M letter -->
