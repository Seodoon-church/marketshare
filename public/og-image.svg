    <circle cx="200" cy="100" r="3" fill="white"/>
    <circle cx="300" cy="100" r="3" fill="white"/>
    <circle cx="100" cy="200" r="3" fill="white"/>
    <circle cx="200" cy="200" r="3" fill="white"/>
    <circle cx="300" cy="200" r="3" fill="white"/>
    <circle cx="900" cy="400" r="3" fill="white"/>
    <circle cx="1000" cy="400" r="3" fill="white"/>
    <circle cx="1100" cy="400" r="3" fill="white"/>
    <circle cx="900" cy="500" r="3" fill="white"/>
    <circle cx="1000" cy="500" r="3" fill="white"/>
    <circle cx="1100" cy="500" r="3" fill="white"/>
  </g>
  <!-- Icon container -->
  <rect x="530" y="140" width="140" height="140" rx="32" fill="rgba(255,255,255,0.15)"/>
  <!-- M icon -->
  <path d="M560 246 L560 188 L600 218 L640 188 L640 246" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M565 195 L600 175 L635 195" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <circle cx="560" cy="246" r="5" fill="white"/>
  <circle cx="640" cy="246" r="5" fill="white"/>
  <circle cx="600" cy="218" r="4" fill="white" opacity="0.7"/>
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="72" letter-spacing="-2" fill="white">MarketShare</text>
  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="sans-serif" font-weight="500" font-size="28" fill="rgba(255,255,255,0.6)">분양몰 특화 전자상거래 플랫폼</text>
