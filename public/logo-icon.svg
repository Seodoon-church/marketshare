<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accent" x1="200" y1="100" x2="350" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- M lettermark with store roof + share node motif -->
  <!-- Store roof (triangle top) -->
  <path d="M152 190 L256 120 L360 190" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <!-- M letter -->
  <path d="M140 380 L140 200 L256 300 L372 200 L372 380" stroke="url(#accent)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Share dots -->
  <circle cx="140" cy="380" r="18" fill="white"/>
  <circle cx="372" cy="380" r="18" fill="white"/>
  <circle cx="256" cy="300" r="14" fill="white" opacity="0.7"/>
</svg>
